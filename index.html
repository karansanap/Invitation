<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow-x:hidden;
  font-family:'Cormorant Garamond', serif;
  background:#f8f3eb;
  color:#5c2c2c;

  -webkit-tap-highlight-color: transparent;
}

/* =========================
   OPENING SCREEN
========================= */

.opening-screen{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:hidden;

  background:#000;

  perspective:1200px;

  cursor:pointer;

box-shadow:
inset 0 80px 120px rgba(0,0,0,0.7);
transition:
opacity 0.8s ease;
}

.opening-screen.fade-out{
  opacity:0;
  pointer-events:none;
}

/* =========================
   REAL THEATER CURTAINS
========================= */

.curtain{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:5;

  transform 2.2s cubic-bezier(0.65,0,0.35,1),
width 2.2s cubic-bezier(0.65,0,0.35,1),
filter 2.2s ease;

background:
repeating-linear-gradient(
  90deg,

  #3f0008 0px,
#5a000d 8px,
#740012 16px,
#8a0018 24px,
#690010 30px,
#4d000b 36px
);

background-size:32px 100%;

  box-shadow:
  inset -5px 0 10px rgba(0,0,0,0.14),
  inset 15px 0 12px rgba(255,255,255,0.02);
filter:
  contrast(1.02)
  saturate(0.92);
  overflow:hidden;
will-change:transform, opacity;
}

/* FABRIC FOLDS */

.curtain::before{
  content:'';
  position:absolute;
  inset:0;

  background:
  radial-gradient(
    circle at center,
    rgba(0,0,0,0.22) 0%,
    rgba(0,0,0,0.08) 28%,
    rgba(255,255,255,0.03) 48%,
    rgba(0,0,0,0.12) 70%,
    transparent 100%
  );

  mix-blend-mode:soft-light;

  transition:all 2.8s ease;
}

/* LEFT */

.left-curtain{
  left:0;
  border-radius:0 0 60px 0;
  transform-origin:left center;
}

/* RIGHT */

.right-curtain{
  right:0;
  border-radius:0 0 0 60px;
  transform-origin:right center;
}

/* OPEN EFFECT */

.opening-screen.open .left-curtain{

  transform:translateX(-55%);
}

.opening-screen.open .right-curtain{

  transform:translateX(55%);
}

/* =========================
   CENTER TAP AREA
========================= */

.tap-text{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10000;

  color:white;

  text-align:center;

  animation:pulse 2s infinite;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.tap-circle{

  width:140px;
  height:140px;

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:58px;
  font-weight:300;

  color:#ffe7b3;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,215,120,0.22),
      rgba(255,255,255,0.04)
    );

  border:
    1px solid rgba(255,230,180,0.28);

  box-shadow:
    0 0 18px rgba(255,215,120,0.18),
    0 0 50px rgba(255,215,120,0.12),
    inset 0 0 22px rgba(255,255,255,0.08);

  text-shadow:
    0 0 14px rgba(255,220,150,0.55);

  animation:
    royalPulse 3s ease-in-out infinite;
}

.tap-text p{

  margin-top:18px;

  font-size:24px;

  letter-spacing:4px;

  color:#fff8e8;

  text-shadow:
    0 0 12px rgba(255,255,255,0.35);
}

@keyframes royalPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes pulse{
  0%{
    transform:translate(-50%,-50%) scale(1);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.05);
  }

  100%{
    transform:translate(-50%,-50%) scale(1);
  }
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{
  min-height:100vh;

  position:relative;

  background:
radial-gradient(
  circle at center,
  #fffaf4 0%,
  #f7f0e8 55%,
  #e8ddd2 100%
);

  overflow:hidden;

  padding:
  70px
  35px
  120px;

  text-align:center;

  max-width:520px;

  margin:auto;

  opacity:0;

  filter:
    brightness(0.7)
    blur(10px);

  transform:scale(1.04);

  transition:
opacity 1.2s ease,
transform 1.2s ease,
filter 1.2s ease;
}

.main-content.visible{
  opacity:1;

  filter:
    brightness(1)
    blur(0px);

  transform:scale(1);
}

.main-content::before{
  content:'';
  position:absolute;
  inset:14px;

  border:1px solid rgba(120,70,70,0.15);

  background:
    rgba(255,255,255,0.35);

  z-index:0;
}

.main-content > *{
  position:relative;
  z-index:2;
}

/* FLOWERS */

.flower{
  position:absolute;
  top:-80px;
  font-size:28px;

  opacity:0;

  z-index:1;

  pointer-events:none;

  animation: falling linear infinite;

  transition:opacity 1.5s ease;
}

.flower1{ left:4%; animation-duration:8s; }
.flower2{ left:15%; animation-duration:10s; }
.flower3{ left:28%; animation-duration:9s; }
.flower4{ left:40%; animation-duration:11s; }
.flower5{ left:52%; animation-duration:8.5s; }
.flower6{ left:65%; animation-duration:10s; }
.flower7{ left:78%; animation-duration:9.5s; }
.flower8{ left:90%; animation-duration:11s; }

@keyframes falling{

  0%{
    transform:
      translateY(-120px)
      translateX(0px)
      rotate(0deg);

    opacity:0;
  }

  15%{
    opacity:1;
  }

  50%{
    transform:
      translateY(50vh)
      translateX(20px)
      rotate(140deg);
  }

  100%{
    transform:
      translateY(120vh)
      translateX(-25px)
      rotate(320deg);

    opacity:0.9;
  }
}

/* BUTTERFLY */

.butterfly{

  position:absolute;

  top:20%;
  left:10%;

  font-size:30px;

  z-index:1;

  opacity:0;

  pointer-events:none;

  animation: butterflyFly 16s ease-in-out infinite alternate;

  transition:opacity 1.5s ease;
}

.main-content.show-animations .flower,
.main-content.show-animations .butterfly{
  opacity:1;
}

@keyframes butterflyFly{

  0%{
    transform:
      translate(0vw, 0vh)
      rotate(0deg);
  }

  25%{
    transform:
      translate(25vw, -10vh)
      rotate(8deg);
  }

  50%{
    transform:
      translate(55vw, 8vh)
      rotate(-10deg);
  }

  75%{
    transform:
      translate(35vw, 12vh)
      rotate(10deg);
  }

  100%{
    transform:
      translate(10vw, -5vh)
      rotate(0deg);
  }
}

/* CONTENT */

.ganpati{
  width:90px;
  margin-top:40px;
}

.ganesh-text{
  margin-top:8px;
  font-size:22px;
  color:#8b1e3f;
}

.invite-text{
  margin-top:22px;
  font-size:18px;
  line-height:1.5;
  color:#6e4b4b;
  padding:0 8px;
}

.names{
  margin-top:18px;
  line-height:1;
}

.names h1{
  font-family:'Great Vibes', cursive;
  font-size:72px;
  color:#b21e4b;
  font-weight:400;
}

.with-text{
  font-size:34px;
  margin:10px 0;
}

.parents{
  margin-top:8px;
  font-size:18px;
  line-height:1.4;
  color:#5b4a4a;
}

/* MUSIC BUTTON */

.music-btn{

  position:fixed;

  right:18px;
  bottom:30px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:rgba(107,45,45,0.92);

  color:white;

  border:none;

  font-size:26px;

  cursor:pointer;

  z-index:50000;

  backdrop-filter:blur(6px);

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);

  opacity:0;
  visibility:hidden;

  transition:0.5s;
}

/* MOBILE */

@media(max-width:768px){

  .names h1{
    font-size:72px;
  }

  .invite-text{
    font-size:20px;
  }

  .parents{
    font-size:22px;
  }

  .ganesh-text{
    font-size:24px;
  }
}

</style>
</head>

<body>

<!-- OPENING SCREEN -->

<div class="opening-screen" id="openingScreen">

  <div class="curtain left-curtain"></div>

<div class="curtain right-curtain"></div>

  <div class="tap-text">
    <div class="tap-circle">❈</div>
    <p>Open Invitation</p>
  </div>

</div>

<!-- MAIN CONTENT -->

<section class="main-content">

<div class="flower flower1">🌸</div>
<div class="flower flower2">🌼</div>
<div class="flower flower3">🍃</div>
<div class="flower flower4">🌹</div>

<div class="flower flower5">🌸</div>
<div class="flower flower6">🌼</div>
<div class="flower flower7">🍃</div>
<div class="flower flower8">🌹</div>

<div class="butterfly">🦋</div>

<img 
class="ganpati"
src="https://cdn-icons-png.flaticon.com/512/720/720106.png"
alt="Ganpati"
>

<div class="ganesh-text">
॥ Shree Ganeshaya Namah ॥
</div>

<div class="invite-text">
We cordially invite you to witness the beginning of our forever and celebrate the wedding ceremony of
</div>

<div class="names">

<h1>Karan</h1>

<div class="parents">
S/o Mr. Sudhir Sanap <br>
& Mrs. Sneha Sanap
</div>

<div class="with-text">with</div>

<h1>Pankti</h1>

<div class="parents">
D/o Mr. Rakesh Jhaveri <br>
& Mrs. Alpa Jhaveri
</div>

</div>

</section>

<!-- MUSIC BUTTON -->

<button class="music-btn">
🔊
</button>

<script>

function openCurtains(){

  document
    .getElementById("openingScreen")
    .classList.add("open");

setTimeout(() => {

  document
    .getElementById("openingScreen")
    .classList.add("fade-out");

}, 1200);

setTimeout(() => {

  document
    .getElementById("openingScreen")
    .style.display = "none";

}, 2000);

  document
    .querySelector(".tap-text")
    .style.display = "none";

  document
    .querySelector(".music-btn")
    .style.cssText =
    "opacity:1; visibility:visible;";

  setTimeout(() => {

  document
    .querySelector(".main-content")
    .classList.add("visible");

  document
    .querySelector(".main-content")
    .classList.add("show-animations");

}, 350);

}

document
  .getElementById("openingScreen")
  .addEventListener("click", openCurtains);

</script>

</body>
</html>
