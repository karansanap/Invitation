<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow-x:hidden;
  font-family:'Cormorant Garamond', serif;
  background:#f8f3eb;
  color:#5c2c2c;

  -webkit-tap-highlight-color: transparent;
}

/* =========================
   OPENING SCREEN
========================= */

.opening-screen{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:hidden;
  background:#120000;
  cursor:pointer;
}

/* =========================
   REALISTIC ROYAL CURTAINS
========================= */

.curtain{
  position:absolute;
  top:0;
  width:55%;
  height:100%;

  overflow:hidden;

  transition:
  transform 2.8s cubic-bezier(0.77,0,0.175,1),
  filter 2.8s ease;

  background:
linear-gradient(
  90deg,
  #140000 0%,
  #3a0000 8%,
  #8c0000 18%,
  #d10000 28%,
  #7c0000 38%,
  #240000 48%,
  #990000 60%,
  #e00000 72%,
  #720000 84%,
  #1a0000 100%
);
    );

  box-shadow:
  inset -40px 0 60px rgba(0,0,0,0.45),
  inset 40px 0 60px rgba(255,255,255,0.05),
  inset 0 0 40px rgba(0,0,0,0.35);
will-change: transform;
backface-visibility:hidden;

  animation:
    curtainMove 7s ease-in-out infinite;
}

.curtain svg{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  pointer-events:none;
}

/* LEFT CURTAIN */

.left-curtain{
  left:0;
  transform-origin:left center;
}

/* RIGHT CURTAIN */

.right-curtain{
  right:0;
  transform-origin:right center;
}

/* OPEN ANIMATION */

/* =========================
   REAL CURTAIN OPENING
========================= */

./* =========================
   REAL THEATER OPENING
========================= */

.opening-screen.open .left-curtain{

  transform:
    translateX(-78%)
    rotateY(12deg);

  filter:brightness(0.92);
}

.opening-screen.open .right-curtain{

  transform:
    translateX(78%)
    rotateY(-12deg);

  filter:brightness(0.92);
}

/* REMOVE SCREEN AFTER OPEN */

/* KEEP CURTAINS VISIBLE */

.opening-screen.open{
  pointer-events:none;
  background:transparent;
}

/* FABRIC ANIMATION */

@keyframes curtainMove{

  0%{
    filter:brightness(1);
  }

  50%{
    filter:brightness(1.08);
  }

  100%{
    filter:brightness(1);
  }
}

/* =========================
   CENTER TAP AREA
========================= */

.tap-text{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10000;

  color:white;

  text-align:center;

  animation:pulse 2s infinite;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.tap-circle{

  width:140px;
  height:140px;

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:58px;
  font-weight:300;

  color:#ffe7b3;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,215,120,0.22),
      rgba(255,255,255,0.04)
    );

  border:
    1px solid rgba(255,230,180,0.28);

  box-shadow:
    0 0 18px rgba(255,215,120,0.18),
    0 0 50px rgba(255,215,120,0.12),
    inset 0 0 22px rgba(255,255,255,0.08);

  text-shadow:
    0 0 14px rgba(255,220,150,0.55);

  animation:
    royalPulse 3s ease-in-out infinite;
}

.tap-text p{

  margin-top:18px;

  font-size:24px;

  letter-spacing:4px;

  color:#fff8e8;

  text-shadow:
    0 0 12px rgba(255,255,255,0.35);
}

@keyframes royalPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes pulse{
  0%{
    transform:translate(-50%,-50%) scale(1);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.05);
  }

  100%{
    transform:translate(-50%,-50%) scale(1);
  }
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{
  min-height:100vh;

  position:relative;

  background:#f7f2ea;

  overflow:hidden;

  padding:
  70px
  35px
  120px;

  text-align:center;

  max-width:520px;

  margin:auto;

  opacity:0.01;

  filter:
    brightness(0.2)
    blur(24px);

  transform:scale(1.04);

  transition:
    opacity 2.8s ease,
    transform 2.8s ease,
    filter 2.8s ease;
}

.main-content.visible{
  opacity:1;

  filter:
    brightness(1)
    blur(0px);

  transform:scale(1);
}

.main-content::before{
  content:'';
  position:absolute;
  inset:14px;

  border:1px solid rgba(120,70,70,0.15);

  background:
    rgba(255,255,255,0.35);

  z-index:0;
}

.main-content > *{
  position:relative;
  z-index:2;
}

/* FLOWERS */

.flower{
  position:absolute;
  top:-80px;
  font-size:28px;

  opacity:0;

  z-index:1;

  pointer-events:none;

  animation: falling linear infinite;

  transition:opacity 1.5s ease;
}

.flower1{ left:4%; animation-duration:8s; }
.flower2{ left:15%; animation-duration:10s; }
.flower3{ left:28%; animation-duration:9s; }
.flower4{ left:40%; animation-duration:11s; }
.flower5{ left:52%; animation-duration:8.5s; }
.flower6{ left:65%; animation-duration:10s; }
.flower7{ left:78%; animation-duration:9.5s; }
.flower8{ left:90%; animation-duration:11s; }

@keyframes falling{

  0%{
    transform:
      translateY(-120px)
      translateX(0px)
      rotate(0deg);

    opacity:0;
  }

  15%{
    opacity:1;
  }

  50%{
    transform:
      translateY(50vh)
      translateX(20px)
      rotate(140deg);
  }

  100%{
    transform:
      translateY(120vh)
      translateX(-25px)
      rotate(320deg);

    opacity:0.9;
  }
}

/* BUTTERFLY */

.butterfly{

  position:absolute;

  top:20%;
  left:10%;

  font-size:30px;

  z-index:1;

  opacity:0;

  pointer-events:none;

  animation: butterflyFly 16s ease-in-out infinite alternate;

  transition:opacity 1.5s ease;
}

.main-content.show-animations .flower,
.main-content.show-animations .butterfly{
  opacity:1;
}

@keyframes butterflyFly{

  0%{
    transform:
      translate(0vw, 0vh)
      rotate(0deg);
  }

  25%{
    transform:
      translate(25vw, -10vh)
      rotate(8deg);
  }

  50%{
    transform:
      translate(55vw, 8vh)
      rotate(-10deg);
  }

  75%{
    transform:
      translate(35vw, 12vh)
      rotate(10deg);
  }

  100%{
    transform:
      translate(10vw, -5vh)
      rotate(0deg);
  }
}

/* CONTENT */

.ganpati{
  width:90px;
  margin-top:40px;
}

.ganesh-text{
  margin-top:8px;
  font-size:22px;
  color:#8b1e3f;
}

.invite-text{
  margin-top:22px;
  font-size:18px;
  line-height:1.5;
  color:#6e4b4b;
  padding:0 8px;
}

.names{
  margin-top:18px;
  line-height:1;
}

.names h1{
  font-family:'Great Vibes', cursive;
  font-size:72px;
  color:#b21e4b;
  font-weight:400;
}

.with-text{
  font-size:34px;
  margin:10px 0;
}

.parents{
  margin-top:8px;
  font-size:18px;
  line-height:1.4;
  color:#5b4a4a;
}

/* MUSIC BUTTON */

.music-btn{

  position:fixed;

  right:18px;
  bottom:30px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:rgba(107,45,45,0.92);

  color:white;

  border:none;

  font-size:26px;

  cursor:pointer;

  z-index:50000;

  backdrop-filter:blur(6px);

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);

  opacity:0;
  visibility:hidden;

  transition:0.5s;
}

/* MOBILE */

@media(max-width:768px){

  .names h1{
    font-size:72px;
  }

  .invite-text{
    font-size:20px;
  }

  .parents{
    font-size:22px;
  }

  .ganesh-text{
    font-size:24px;
  }
}

</style>
</head>

<script>

function openCurtains(){

  document
    .getElementById("openingScreen")
    .classList.add("open");

  document
    .querySelector(".tap-text")
    .style.display = "none";

  document
    .querySelector(".music-btn")
    .style.cssText =
    "opacity:1; visibility:visible;";

  setTimeout(() => {

  document
    .querySelector(".main-content")
    .classList.add("visible");

  document
    .querySelector(".main-content")
    .classList.add("show-animations");

}, 1400);

}

document
  .getElementById("openingScreen")
  .addEventListener("click", openCurtains);

</script>
