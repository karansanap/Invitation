<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Wedding Invitation</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      overflow-x:hidden;
      font-family:'Cormorant Garamond', serif;
      background:#f8f3eb;
      color:#5c2c2c;
    }

    /* =======================================================
       CURTAIN SCREEN
    ======================================================= */

    .opening-screen{
      position:fixed;
      width:100%;
      height:100vh;
      top:0;
      left:0;
      z-index:9999;
      overflow:hidden;
      background:#250000;
    }

    .curtain{
      position:absolute;
      top:0;
      width:52%;
      height:100%;
      background:linear-gradient(
        to right,
        #5b0000,
        #8b0000,
        #6d0000
      );

      transition:transform 2.2s ease-in-out;
      overflow:hidden;
    }

    /* Velvet folds */

    .curtain::before{
      content:'';
      position:absolute;
      inset:0;

      background:
      repeating-radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.35) 0px,
        rgba(255,255,255,0.35) 2px,
        transparent 4px,
        transparent 38px
      );

      opacity:0.95;

      transform:scaleX(0.35);

      filter:blur(0.4px);
    }

    /* Light reflection */

    .curtain::after{
      content:'';
      position:absolute;
      inset:0;

      background:
      linear-gradient(
        to right,
        rgba(255,255,255,0.18),
        transparent 20%,
        transparent 80%,
        rgba(255,255,255,0.08)
      );
    }

    .left-curtain{
      left:0;
      border-right:3px solid rgba(255,255,255,0.25);
      border-top-right-radius:20px;
      border-bottom-right-radius:20px;
    }

    .right-curtain{
      right:0;
      border-left:3px solid rgba(255,255,255,0.25);
      border-top-left-radius:20px;
      border-bottom-left-radius:20px;
    }

    /* OPEN ANIMATION */

    .opening-screen.open .left-curtain{
      transform:translateX(-72%);
    }

    .opening-screen.open .right-curtain{
      transform:translateX(72%);
    }

    /* Curtain tie ropes */

    .rope{
      position:absolute;
      width:14px;
      height:120px;
      background:gold;
      border-radius:20px;
      top:42%;
      z-index:5;
      box-shadow:0 0 10px rgba(255,215,0,0.5);
    }

    .rope-left{
      right:18px;
    }

    .rope-right{
      left:18px;
    }

    /* TAP TEXT */

    .tap-text{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:10000;
      color:white;
      text-align:center;
      cursor:pointer;
      animation:pulse 2s infinite;
    }

    .tap-circle{
      width:90px;
      height:90px;
      border:2px solid rgba(255,255,255,0.6);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      font-size:34px;
      backdrop-filter:blur(6px);
      background:rgba(255,255,255,0.05);
    }

    .tap-text p{
      margin-top:14px;
      font-size:18px;
      letter-spacing:3px;
      text-transform:uppercase;
    }

    @keyframes pulse{

      0%{
        transform:translate(-50%,-50%) scale(1);
      }

      50%{
        transform:translate(-50%,-50%) scale(1.05);
      }

      100%{
        transform:translate(-50%,-50%) scale(1);
      }
    }

    /* =======================================================
       MAIN CONTENT
    ======================================================= */

    .main-content{
      min-height:100vh;
      width:100%;
      background:#f8f3eb;
      position:relative;
      overflow:hidden;
      padding:50px 25px 90px;
      text-align:center;
    }

    /* Floral top */

    .top-flowers{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }

    .top-flowers img{
      width:100%;
      max-width:550px;
      opacity:0.9;
    }

    /* Floating decorations */

    .flower{
      position:absolute;
      font-size:28px;
      animation:float 6s infinite ease-in-out;
      opacity:0.95;
    }

    .flower1{
      top:120px;
      left:20px;
    }

    .flower2{
      top:250px;
      right:20px;
      animation-delay:1s;
    }

    .flower3{
      bottom:240px;
      left:20px;
      animation-delay:2s;
    }

    .flower4{
      bottom:120px;
      right:25px;
      animation-delay:3s;
    }

    .flower5{
      top:420px;
      left:45px;
      animation-delay:4s;
    }

    .flower6{
      bottom:330px;
      right:50px;
      animation-delay:2s;
    }

    @keyframes float{

      0%{
        transform:translateY(0px) rotate(0deg);
      }

      50%{
        transform:translateY(-14px) rotate(8deg);
      }

      100%{
        transform:translateY(0px) rotate(0deg);
      }
    }

    /* Ganpati */

    .ganpati{
      width:120px;
      margin-top:40px;
      animation:fadeIn 2s ease;
    }

    .ganesh-text{
      margin-top:16px;
      font-size:30px;
      color:#8b1e3f;
      font-weight:500;
    }

    /* Invite text */

    .invite-text{
      margin-top:55px;
      font-size:22px;
      line-height:1.7;
      color:#6e4b4b;
      padding:0 10px;
    }

    /* Names */

    .names{
      margin-top:45px;
      line-height:1.2;
    }

    .names h1{
      font-family:'Great Vibes', cursive;
      font-size:95px;
      color:#b21e4b;
      font-weight:400;
      animation:fadeInUp 2s ease;
    }

    .with-text{
      font-size:48px;
      margin:18px 0;
      font-family:'Great Vibes', cursive;
      color:#7c2342;
    }

    /* Parents */

    .parents{
      margin-top:20px;
      font-size:28px;
      line-height:1.7;
      color:#5b4a4a;
    }

    /* Scroll */

    .scroll{
      margin-top:70px;
      font-size:24px;
      color:#6a3a3a;
      animation:bounce 2s infinite;
    }

    @keyframes bounce{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(10px);
      }
    }

    /* Music button */

    .music-btn{
      position:fixed;
      right:18px;
      bottom:25px;
      width:68px;
      height:68px;
      border-radius:50%;
      background:#6b2d2d;
      color:white;
      border:none;
      font-size:28px;
      z-index:500;
      cursor:pointer;
      box-shadow:0 4px 14px rgba(0,0,0,0.25);
    }

    /* Decorative corners */

    .corner{
      position:absolute;
      font-size:60px;
      opacity:0.25;
      pointer-events:none;
    }

    .corner1{
      top:20px;
      left:10px;
    }

    .corner2{
      top:20px;
      right:10px;
    }

    .corner3{
      bottom:20px;
      left:10px;
    }

    .corner4{
      bottom:20px;
      right:10px;
    }

    /* Animations */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeInUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* =======================================================
       MOBILE
    ======================================================= */

    @media(max-width:768px){

      .names h1{
        font-size:72px;
      }

      .invite-text{
        font-size:20px;
      }

      .parents{
        font-size:22px;
      }

      .ganesh-text{
        font-size:24px;
      }

      .with-text{
        font-size:40px;
      }

      .tap-circle{
        width:80px;
        height:80px;
      }

    }

  </style>

</head>

<body>

  <!-- =======================================================
       CURTAIN SCREEN
  ======================================================== -->

  <div class="opening-screen" id="openingScreen">

    <div class="curtain left-curtain">
      <div class="rope rope-left"></div>
    </div>

    <div class="curtain right-curtain">
      <div class="rope rope-right"></div>
    </div>

    <!-- Tap text -->

    <div class="tap-text" onclick="openCurtains()">

      <div class="tap-circle">
        ☝
      </div>

      <p>Tap to Open</p>

    </div>

  </div>

  <!-- =======================================================
       MAIN INVITATION
  ======================================================== -->

  <section class="main-content">

    <!-- Decorative Corners -->

    <div class="corner corner1">❀</div>
    <div class="corner corner2">❀</div>
    <div class="corner corner3">❀</div>
    <div class="corner corner4">❀</div>

    <!-- Floating flowers -->

    <div class="flower flower1">🌸</div>
    <div class="flower flower2">🦋</div>
    <div class="flower flower3">🌺</div>
    <div class="flower flower4">🍃</div>
    <div class="flower flower5">🌷</div>
    <div class="flower flower6">🦋</div>

    <!-- Ganpati -->

    <img
      class="ganpati"
      src="https://cdn-icons-png.flaticon.com/512/720/720106.png"
      alt="Ganpati"
    >

    <!-- Shree Ganesh -->

    <div class="ganesh-text">
      ॥ Shree Ganeshaya Namah ॥
    </div>

    <!-- Invite text -->

    <div class="invite-text">

      We cordially invite you to witness the beginning of our forever and celebrate the wedding ceremony of

    </div>

    <!-- Names -->

    <div class="names">

      <h1>Rushikesh</h1>

      <div class="parents">

        S/o Mr. Sanjay Deshmukh
        <br>
        & Mrs. Seema Deshmukh

      </div>

      <div class="with-text">
        with
      </div>

      <h1>Prajakta</h1>

      <div class="parents">

        D/o Mr. Dasharath Yadav
        <br>
        & Mrs. Ujjwala Yadav

      </div>

    </div>

    <!-- Scroll -->

    <div class="scroll">
      Scroll ↓
    </div>

  </section>

  <!-- =======================================================
       MUSIC BUTTON
  ======================================================== -->

  <button class="music-btn">
    🔊
  </button>

  <!-- =======================================================
       SCRIPT
  ======================================================== -->

  <script>

    function openCurtains(){

      document
        .getElementById("openingScreen")
        .classList.add("open");

      document
        .querySelector(".tap-text")
        .style.display = "none";

    }

  </script>

</body>
</html>
