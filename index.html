<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow-x:hidden;
  font-family:'Cormorant Garamond', serif;
  background:#f8f3eb;
  color:#5c2c2c;

  -webkit-tap-highlight-color: transparent;
}

/* =========================
   OPENING SCREEN
========================= */

.opening-screen{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:hidden;

  background:#000;

  perspective:1200px;

  cursor:pointer;

box-shadow:
inset 0 80px 120px rgba(0,0,0,0.7);
transition:
opacity 0.8s ease;
}

.opening-screen.fade-out{
  opacity:0;
  pointer-events:none;
}

/* =========================
   REAL THEATRE CURTAINS
========================= */

.curtain{

  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:5;

  overflow:hidden;

  transition:
    transform 2.4s cubic-bezier(0.16,1,0.3,1),
    width 2.4s cubic-bezier(0.16,1,0.3,1),
    filter 2s ease;

  background:
repeating-linear-gradient(
  90deg,
  #3f0008 0px,
  #5a000d 6px,
  #740012 12px,
  #8a0018 18px,
  #690010 24px,
  #4d000b 30px
);

background-size:24px 100%;

  box-shadow:
    inset -8px 0 18px rgba(0,0,0,0.35),
    inset 10px 0 12px rgba(255,255,255,0.04);

  will-change:transform,width;
}

/* HEAVY FABRIC DEPTH */

.curtain::before{

  content:'';
  position:absolute;
  inset:0;

  background:
  repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.08) 0px,
    rgba(255,255,255,0.02) 6px,
    rgba(0,0,0,0.22) 14px,
    rgba(255,255,255,0.03) 22px
  );

  mix-blend-mode:soft-light;
}

/* EXTRA SHADOW FOR FOLDS */

.curtain::after{

  content:'';
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to right,
      rgba(0,0,0,0.28),
      transparent 18%,
      transparent 82%,
      rgba(0,0,0,0.28)
    );
}

/* LEFT CURTAIN */

.left-curtain{
  left:0;
  transform-origin:left center;
}

/* RIGHT CURTAIN */

.right-curtain{
  right:0;
  transform-origin:right center;
}

/* =========================
   OPENING ANIMATION
========================= */

.opening-screen.open .left-curtain{

  width:10%;

  transform:
    translateX(-2%)
    scaleX(0.25)
    rotate(-1deg);

  filter:
    brightness(0.85);
}

.opening-screen.open .right-curtain{

  width:10%;

  transform:
    translateX(2%)
    scaleX(0.25)
    rotate(1deg);

  filter:
    brightness(0.85);
}

/* =========================
   CENTER TAP AREA
========================= */

.tap-text{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10000;

  color:white;

  text-align:center;

  animation:pulse 2s infinite;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.tap-circle{

  width:140px;
  height:140px;

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:58px;
  font-weight:300;

  color:#ffe7b3;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,215,120,0.22),
      rgba(255,255,255,0.04)
    );

  border:
    1px solid rgba(255,230,180,0.28);

  box-shadow:
    0 0 18px rgba(255,215,120,0.18),
    0 0 50px rgba(255,215,120,0.12),
    inset 0 0 22px rgba(255,255,255,0.08);

  text-shadow:
    0 0 14px rgba(255,220,150,0.55);

  animation:
    royalPulse 3s ease-in-out infinite;
}

.tap-text p{

  margin-top:18px;

  font-size:24px;

  letter-spacing:4px;

  color:#fff8e8;

  text-shadow:
    0 0 12px rgba(255,255,255,0.35);
}

@keyframes royalPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes pulse{
  0%{
    transform:translate(-50%,-50%) scale(1);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.05);
  }

  100%{
    transform:translate(-50%,-50%) scale(1);
  }
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{

  min-height:100vh;

  position:relative;

  background:
  linear-gradient(
    to bottom,
    #f6fbf4 0%,
    #edf7ea 30%,
    #e2f0dd 65%,
    #d6e8d0 100%
  );
width:100%;
  overflow:hidden;
  padding:
    30px
    20px
    40px;


  text-align:center;

  max-width:520px;

  margin:auto;

  transition:opacity 0.8s ease;
}



.main-content::before{
  content:'';
  position:absolute;
  inset:14px;

  border:1px solid rgba(90,120,90,0.12);

background:
rgba(255,255,255,0.22);

  z-index:0;
}

.main-content > *{
  position:relative;
  z-index:2;
}

/* FLOWERS */

.flower{
  position:absolute;
  top:-80px;
  font-size:28px;

  opacity:0;

  z-index:1;

  pointer-events:none;

  animation: falling linear infinite;

  transition:opacity 1.5s ease;
}

.flower1{ left:4%; animation-duration:8s; }
.flower2{ left:15%; animation-duration:10s; }
.flower3{ left:28%; animation-duration:9s; }
.flower4{ left:40%; animation-duration:11s; }
.flower5{ left:52%; animation-duration:8.5s; }
.flower6{ left:65%; animation-duration:10s; }
.flower7{ left:78%; animation-duration:9.5s; }
.flower8{ left:90%; animation-duration:11s; }

@keyframes falling{

  0%{
    transform:
      translateY(-120px)
      translateX(0px)
      rotate(0deg);

    opacity:0;
  }

  15%{
    opacity:1;
  }

  50%{
    transform:
      translateY(50vh)
      translateX(20px)
      rotate(140deg);
  }

  100%{
    transform:
      translateY(120vh)
      translateX(-25px)
      rotate(320deg);

    opacity:0.9;
  }
}

/* BUTTERFLY */

.butterfly{

  position:absolute;

  top:20%;
  left:10%;

  font-size:30px;

  z-index:1;

  opacity:0;

  pointer-events:none;

  animation: butterflyFly 16s ease-in-out infinite alternate;

  transition:opacity 1.5s ease;
}

.main-content.show-animations .flower,
.main-content.show-animations .butterfly{
  opacity:1;
}

@keyframes butterflyFly{

  0%{
    transform:
      translate(0vw, 0vh)
      rotate(0deg);
  }

  25%{
    transform:
      translate(25vw, -10vh)
      rotate(8deg);
  }

  50%{
    transform:
      translate(55vw, 8vh)
      rotate(-10deg);
  }

  75%{
    transform:
      translate(35vw, 12vh)
      rotate(10deg);
  }

  100%{
    transform:
      translate(10vw, -5vh)
      rotate(0deg);
  }
}

/* CONTENT */

.ganpati{

  width:115px;

  max-width:42%;

  display:block;

  margin:
    6px auto 2px;

  mix-blend-mode:multiply;

  opacity:0.96;

  border-radius:20px;

  filter:
    contrast(1.05)
    brightness(0.98);

}

@keyframes ganpatiFloat{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-7px);
  }

  100%{
    transform:translateY(0px);
  }
}

.ganesh-text{
  margin-top:2px;
  font-size:16px;
  color:#8b1e3f;
}

.invite-text{
  margin-top:12px;
  font-size:13px;
  line-height:1.45;
  color:#6e4b4b;
  padding:0 8px;
}

.names{
  margin-top:10px;
  line-height:1;
}

.names h1{
  font-family:'Great Vibes', cursive;

  font-size:38px;

  line-height:1;

  color:#b21e4b;

  font-weight:400;

  word-break:break-word;
}

.with-text{

  font-size:18px;

  margin:2px 0;

}

.parents{

  margin-top:4px;

  font-size:11px;

  line-height:1.4;

  padding:0 10px;
}

/* MUSIC BUTTON */

.music-btn{

  position:fixed;

  right:18px;
  bottom:30px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:rgba(107,45,45,0.92);

  color:white;

  border:none;

  font-size:26px;

  cursor:pointer;

  z-index:50000;

  backdrop-filter:blur(6px);

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);

  opacity:0;
  visibility:hidden;

  transition:0.5s;
}

/* MOBILE */

@media(max-width:768px){

  .names h1{
    font-size:72px;
  }

  .invite-text{
    font-size:20px;
  }

  .parents{
    font-size:22px;
  }

  .ganesh-text{
    font-size:24px;
  }
}

</style>
</head>

<body>

<!-- OPENING SCREEN -->

<div class="opening-screen" id="openingScreen">

  <div class="curtain left-curtain"></div>

<div class="curtain right-curtain"></div>

  <div class="tap-text">
    <div class="tap-circle">❈</div>
    <p>Open Invitation</p>
  </div>

</div>

<!-- MAIN CONTENT -->

<section class="main-content">

<div class="flower flower1">🌸</div>
<div class="flower flower2">🌼</div>
<div class="flower flower3">🍃</div>
<div class="flower flower4">🌹</div>

<div class="flower flower5">🌸</div>
<div class="flower flower6">🌼</div>
<div class="flower flower7">🍃</div>
<div class="flower flower8">🌹</div>

<div class="butterfly">🦋</div>

<img 
class="ganpati"
src="Ganpati.png""
alt="Ganpati"
/>

<div class="ganesh-text">
॥ Shree Ganeshaya Namah ॥
</div>

<div class="invite-text">
We cordially invite you to witness the beginning of our forever and celebrate the wedding ceremony of
</div>

<div class="names">

<h1>Karan</h1>

<div class="parents">
S/o Mr. Sudhir Sanap <br>
& Mrs. Sneha Sanap
</div>

<div class="with-text">with</div>

<h1>Pankti</h1>

<div class="parents">
D/o Mr. Rakesh Jhaveri <br>
& Mrs. Alpa Jhaveri
</div>

</div>

</section>

<!-- MUSIC BUTTON -->

<button class="music-btn">
🔊
</button>

<script>

function openCurtains(){

  const screen = document.getElementById("openingScreen");

  screen.classList.add("open");

  document.querySelector(".tap-text").style.display = "none";

  document.querySelector(".music-btn").style.cssText =
    "opacity:1; visibility:visible;";

  /* SHOW MAIN CONTENT QUICKLY */
  setTimeout(() => {

    document
      .querySelector(".main-content")
      .classList.add("visible");

    document
      .querySelector(".main-content")
      .classList.add("show-animations");

  }, 180);

  /* FADE BLACK OVERLAY */
  setTimeout(() => {

    screen.classList.add("fade-out");

  }, 1700);

  /* REMOVE COMPLETELY */
  setTimeout(() => {

    screen.style.display = "none";

  }, 2600);

}

document
  .getElementById("openingScreen")
  .addEventListener("click", openCurtains);

</script>

</body>
</html>
