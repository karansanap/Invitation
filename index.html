<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Wedding Invitation</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow-x:hidden;
      font-family:'Cormorant Garamond', serif;
      background:#f8f3eb;
      color:#5c2c2c;
    }

    /* ---------------- CURTAIN SCREEN ---------------- */

    .opening-screen{
  position:fixed;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  z-index:9999;
  overflow:hidden;

  background:
  radial-gradient(
    circle at center,
    rgba(255,215,120,0.08),
    transparent 70%
  );
}

    .curtain{
  position:absolute;
  top:0;
  width:52%;
  height:100%;

  background: linear-gradient(
    to right,
    #4d0000,
    #7a0000,
    #a00000,
    #6b0000
  );

  background-size:200% 200%;

  transition: transform 2.4s cubic-bezier(0.77, 0, 0.175, 1);

  overflow:hidden;

  animation:
    fabricWave 6s ease-in-out infinite,
    curtainGlow 10s ease infinite;
}

@keyframes curtainGlow{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }

}

@keyframes fabricWave {
  0%{
    filter: brightness(1);
    transform: translateY(0px);
  }
  50%{
    filter: brightness(1.05);
    transform: translateY(-2px);
  }
  100%{
    filter: brightness(1);
    transform: translateY(0px);
  }
}
  transition: transform 2.4s cubic-bezier(0.77, 0, 0.175, 1);
  overflow:hidden;

  /* subtle fabric movement */
  animation: fabricWave 6s ease-in-out infinite;
}

    /* curtain texture lines */

.curtain::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;

  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.38) 0px,
      rgba(255,255,255,0.38) 3px,
      transparent 3px,
      transparent 28px
    );

  opacity:0.35;
}

    .left-curtain{
      left:0;
      border-right:2px solid rgba(255,255,255,0.2);
    }

    .right-curtain{
      right:0;
      border-left:2px solid rgba(255,255,255,0.2);
    }
/* curtain tie */


.left-curtain{
  transform-origin: left center;
}

.right-curtain{
  transform-origin: right center;
}

/* curtains tied at sides */

/* curtains fully tied to sides */

.opening-screen.open .left-curtain{
  transform: translateX(-92%) rotate(-6deg);
}

.opening-screen.open .right-curtain{
  transform: translateX(92%) rotate(6deg);
}

    /* Tap Text */

    .tap-text{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10000;

  color:white;

  text-align:center;

  cursor:pointer;

  animation:pulse 2s infinite;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

    .tap-circle{

  width:120px;
  height:120px;

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:72px;

  color:rgba(255,255,255,0.55);

  background:
    radial-gradient(
      circle,
      rgba(255,215,120,0.22),
      rgba(255,255,255,0.05)
    );

  border:1px solid rgba(255,255,255,0.15);

  border-radius:50%;

  backdrop-filter:blur(8px);

  box-shadow:
    0 0 25px rgba(255,215,120,0.25),
    inset 0 0 18px rgba(255,255,255,0.08);

  text-shadow:
    0 0 18px rgba(255,220,150,0.35);

  animation: handGlow 2.5s ease-in-out infinite;
}

@keyframes handGlow{

  0%{
    transform:scale(1);
    box-shadow:
      0 0 18px rgba(255,215,120,0.18);
  }

  50%{
    transform:scale(1.06);
    box-shadow:
      0 0 38px rgba(255,215,120,0.38);
  }

  100%{
    transform:scale(1);
    box-shadow:
      0 0 18px rgba(255,215,120,0.18);
  }

}
.opening-screen::after{

  content:'';

  position:absolute;

  top:0;
  left:50%;

  transform:translateX(-50%);

  width:120px;
  height:100%;

  background:
    linear-gradient(
      to bottom,
      rgba(255,215,120,0.18),
      transparent,
      rgba(255,215,120,0.12)
    );

  filter:blur(18px);

  z-index:9998;

  pointer-events:none;
}
    .tap-text p{

  margin-top:18px;

  font-size:24px;

  letter-spacing:4px;

  color:#fff8e8;

  text-shadow:
    0 0 12px rgba(255,255,255,0.35);

  font-family:'Cormorant Garamond', serif;
}

    @keyframes pulse{
      0%{
        transform:translate(-50%,-50%) scale(1);
      }
      50%{
        transform:translate(-50%,-50%) scale(1.05);
      }
      100%{
        transform:translate(-50%,-50%) scale(1);
      }
    }

    /* ---------------- MAIN INVITE ---------------- */

    .main-content{
  height:100vh;
  width:100%;
  background:#f7f1e8;
  position:relative;
  overflow:hidden;

  padding:20px 18px 140px;

  text-align:center;

  display:flex;
  flex-direction:column;
  align-items:center;
}
.main-content::before{
  content:'';
  position:absolute;
  inset:14px;

  border:1px solid rgba(120,70,70,0.15);

  background:
    rgba(255,255,255,0.35);

  z-index:0;
}

.main-content > *{
  position:relative;
  z-index:2;
}

    /* Floral top border */

    .top-border{
      width:100%;
      position:absolute;
      top:0;
      left:0;
      display:flex;
      justify-content:center;
    }

    .top-border img{
      width:100%;
      max-width:500px;
    }

    /* Floating flowers */

    .flower{
  position:absolute;
  top:-80px;
  font-size:28px;

  opacity:0;

  z-index:1;

  pointer-events:none;

  will-change: transform;

  animation: falling linear infinite;

  transition:opacity 1.5s ease;
}

/* More flowers with slower elegant motion */

.flower1{
  left:4%;
  animation-duration:8s;
  animation-delay:0s;
}

.flower2{
  left:15%;
  animation-duration:10s;
  animation-delay:2s;
}

.flower3{
  left:28%;
  animation-duration:9s;
  animation-delay:1s;
}

.flower4{
  left:40%;
  animation-duration:11s;
  animation-delay:3s;
}

.flower5{
  left:52%;
  animation-duration:8.5s;
  animation-delay:1.5s;
}

.flower6{
  left:65%;
  animation-duration:10s;
  animation-delay:4s;
}

.flower7{
  left:78%;
  animation-duration:9.5s;
  animation-delay:2.5s;
}

.flower8{
  left:90%;
  animation-duration:11s;
  animation-delay:1s;
}

@keyframes falling{

  0%{
    transform:
      translateY(-120px)
      translateX(0px)
      rotate(0deg);

    opacity:0;
  }

  15%{
    opacity:1;
  }

  50%{
    transform:
      translateY(50vh)
      translateX(20px)
      rotate(140deg);
  }

  100%{
    transform:
      translateY(120vh)
      translateX(-25px)
      rotate(320deg);

    opacity:0.9;
  }

}
    
/* Butterfly Flying */

/* Butterfly Flying */

.butterfly{

  position:absolute;

  top:20%;
  left:10%;

  font-size:30px;

  z-index:1;

  opacity:0;

  pointer-events:none;

  animation: butterflyFly 16s ease-in-out infinite alternate;

  transition:opacity 1.5s ease;
}

/* Show after opening */

.main-content.show-animations .flower,
.main-content.show-animations .butterfly{
  opacity:1;
}

/* Natural butterfly movement */

@keyframes butterflyFly{

  0%{
    transform:
      translate(0vw, 0vh)
      rotate(0deg);
  }

  15%{
    transform:
      translate(18vw, -8vh)
      rotate(8deg);
  }

  30%{
    transform:
      translate(35vw, 6vh)
      rotate(-10deg);
  }

  45%{
    transform:
      translate(55vw, -10vh)
      rotate(12deg);
  }

  60%{
    transform:
      translate(70vw, 4vh)
      rotate(-8deg);
  }

  75%{
    transform:
      translate(45vw, 12vh)
      rotate(10deg);
  }

  100%{
    transform:
      translate(10vw, -5vh)
      rotate(0deg);
  }

}
    /* Ganpati */

    .ganpati{
  width:90px;
  margin-top:40px;
}

    .ganesh-text{
  margin-top:8px;
  font-size:22px;
  color:#8b1e3f;
}

    /* Invite text */

    .invite-text{
  margin-top:22px;
  font-size:18px;
  line-height:1.5;
  color:#6e4b4b;
  padding:0 8px;
}

    /* Names */

    .names{
  margin-top:18px;
  line-height:1;
}

    .names h1{
  font-family:'Great Vibes', cursive;
  font-size:72px;
  color:#b21e4b;
  font-weight:400;
}

    .with-text{
  font-size:34px;
  margin:10px 0;
}

    /* Parents */

    .parents{
  margin-top:8px;
  font-size:18px;
  line-height:1.4;
  color:#5b4a4a;
}

    /* Scroll indicator */

    .scroll{
      margin-top:60px;
      font-size:20px;
      animation:bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(10px);
      }
    }

    /* Music Button */

    .music-btn{

  position:fixed;

  right:18px;
  bottom:30px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:rgba(107,45,45,0.92);

  color:white;

  border:none;

  font-size:26px;

  cursor:pointer;

  z-index:50000;

  backdrop-filter:blur(6px);

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);

  opacity:0;
  visibility:hidden;

  transition:0.5s;
}

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Mobile */

    @media(max-width:768px){

      .names h1{
        font-size:72px;
      }

      .invite-text{
        font-size:20px;
      }

      .parents{
        font-size:22px;
      }

      .ganesh-text{
        font-size:24px;
      }

    }

  </style>
</head>

<body>

  <!-- CURTAIN SCREEN -->

  <div class="opening-screen" id="openingScreen">

    <div class="curtain left-curtain"></div>
    <div class="curtain right-curtain"></div>

    <div class="tap-text" onclick="openCurtains()">
<div class="tap-circle">🤚</div>
      <p>Tap to Open</p>
    </div>

  </div>

  <!-- MAIN CONTENT -->

  <section class="main-content">

<div class="flower flower1">🌸</div>
<div class="flower flower2">🌼</div>
<div class="flower flower3">🍃</div>
<div class="flower flower4">🌹</div>

<div class="flower flower5">🌸</div>
<div class="flower flower6">🌼</div>
<div class="flower flower7">🍃</div>
<div class="flower flower8">🌹</div>
<div class="butterfly">🦋</div>

    <!-- Ganpati -->

    <img 
      class="ganpati"
      src="https://cdn-icons-png.flaticon.com/512/720/720106.png"
      alt="Ganpati"
    >

    <div class="ganesh-text">
      ॥ Shree Ganeshaya Namah ॥
    </div>

    <!-- Invite -->

    <div class="invite-text">
      We cordially invite you to witness the beginning of our forever and celebrate the wedding ceremony of
    </div>

    <!-- Names -->

    <div class="names">

      <h1>Karan</h1>

      <div class="parents">
        S/o Mr. Sudhir Sanap <br>
        & Mrs. Sneha Sanap
      </div>

      <div class="with-text">with</div>

      <h1>Pankti</h1>

      <div class="parents">
        D/o Mr. Rakesh Jhaveri <br>
        & Mrs. Alpa Jhaveri
      </div>

    </div>

  </section>

  <!-- MUSIC BUTTON -->

  <button class="music-btn">
    🔊
  </button>

  <!-- SCRIPT -->

  <script>

function openCurtains(){

  document
    .getElementById("openingScreen")
    .classList.add("open");

  document
    .querySelector(".tap-text")
    .style.display = "none";

  document
    .querySelector(".music-btn")
    .style.cssText =
    "opacity:1; visibility:visible;";

  /* show flowers + butterfly */

  document
    .querySelector(".main-content")
    .classList.add("show-animations");
}

</script>

</body>
</html>
